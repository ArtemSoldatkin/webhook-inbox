services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["${POSTGRES_PORT}:5432"]
    volumes:
      - db_data:/var/lib/postgresql/data
    profiles:
      - prod
      - dev

  app:
    build: .
    ports:
      - "${API_PORT}:8080"
    environment:
      # Shared configuration
      ENV: ${ENV}

      # Database configuration
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}

      # API configuration
      API_PROTOCOL: ${API_PROTOCOL}
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}

      API_RATE_LIMIT_REQUESTS: ${API_RATE_LIMIT_REQUESTS}
      API_RATE_LIMIT_WINDOW_SEC: ${API_RATE_LIMIT_WINDOW_SEC}
      API_THROTTLE_CONCURRENT_LIMIT: ${API_THROTTLE_CONCURRENT_LIMIT}
      API_REQUEST_SIZE_LIMIT_BYTES: ${API_REQUEST_SIZE_LIMIT_BYTES}

      API_CORS_MAX_AGE_SEC: ${API_CORS_MAX_AGE_SEC}

      API_CACHE_NUM_COUNTERS: ${API_CACHE_NUM_COUNTERS}
      API_CACHE_MAX_COST: ${API_CACHE_MAX_COST}
      API_CACHE_BUFFER_ITEMS: ${API_CACHE_BUFFER_ITEMS}

      API_CACHE_DEFAULT_COST: ${API_CACHE_DEFAULT_COST}

      API_CACHE_SOURCE_TTL_SEC: ${API_CACHE_SOURCE_TTL_SEC}
      API_CACHE_EVENT_TTL_SEC: ${API_CACHE_EVENT_TTL_SEC}

      API_DEFAULT_PAGE_SIZE: ${API_DEFAULT_PAGE_SIZE}
      API_MIN_PAGE_SIZE: ${API_MIN_PAGE_SIZE}
      API_MAX_PAGE_SIZE: ${API_MAX_PAGE_SIZE}

      API_MAX_SEARCH_QUERY_LENGTH: ${API_MAX_SEARCH_QUERY_LENGTH}

      API_DELIVERY_INTERVAL_SEC: ${API_DELIVERY_INTERVAL_SEC}
      API_DELIVERY_MAX_CONCURRENCY: ${API_DELIVERY_MAX_CONCURRENCY}
      API_DELIVERY_TIMEOUT_SEC: ${API_DELIVERY_TIMEOUT_SEC}
      API_DELIVERY_REQUEST_TIMEOUT_SEC: ${API_DELIVERY_REQUEST_TIMEOUT_SEC}

      API_DELIVERY_MAX_RETRIES: ${API_DELIVERY_MAX_RETRIES}
      API_DELIVERY_RETRY_BACKOFF_BASE_SEC: ${API_DELIVERY_RETRY_BACKOFF_BASE_SEC}
      API_DELIVERY_RETRY_BACKOFF_MAX_SEC: ${API_DELIVERY_RETRY_BACKOFF_MAX_SEC}

      API_RECOVERY_INTERVAL_SEC: ${API_RECOVERY_INTERVAL_SEC}
      API_RECOVERY_TIMEOUT_SEC: ${API_RECOVERY_TIMEOUT_SEC}

      # UI configuration
      UI_PROTOCOL: ${UI_PROTOCOL}
      UI_HOST: ${UI_HOST}
      UI_PORT: ${UI_PORT}

    depends_on:
      - db
    profiles:
      - prod
      - dev

  dev-server:
    build:
      context: ./dev-tools
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
    profiles:
      - dev

volumes:
  db_data:

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["${POSTGRES_PORT}:5432"]
    volumes:
      - db_data:/var/lib/postgresql/data
    profiles:
      - prod
      - dev

  app:
    build: .
    ports:
      - "${API_PORT}:8080"
    environment:
      API_PORT: ${API_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
    depends_on:
      - db
    profiles:
      - prod
      - dev

  dev-server:
    build:
      context: ./dev-tools
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
    profiles:
      - dev

volumes:
  db_data:
